<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrackFinan | Reportes</title>
    <link rel="stylesheet" href="../assets/css/variables.css" />
    <link rel="stylesheet" href="../assets/css/reset.css" />
    <link rel="stylesheet" href="../assets/css/components.css" />
    <link rel="stylesheet" href="../assets/css/layout.css" />
    <link rel="stylesheet" href="../assets/css/pages.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">TrackFinan</div>
        <nav class="nav">
          <a class="nav-link" href="dashboard.html">Dashboard</a>
          <a class="nav-link" href="accounts.html">Cuentas</a>
          <a class="nav-link" href="categories.html">Categorías</a>
          <a class="nav-link" href="payment-methods.html">Métodos de pago</a>
          <a class="nav-link" href="transactions.html">Transacciones</a>
          <a class="nav-link" href="budgets.html">Presupuestos</a>
          <a class="nav-link" href="reports.html">Reportes</a>
        </nav>
      </aside>
      <main class="content">
        <div class="container stack">
          <header class="topbar">
            <h1 class="hero-title">Reportes</h1>
            <button id="logoutBtn" class="btn btn-danger" type="button">Salir</button>
          </header>
          <section class="card stack">
            <h2>Filtros</h2>
            <form id="reportFilterForm" class="actions">
              <input class="input" type="date" name="startDate" required />
              <input class="input" type="date" name="endDate" required />
              <button class="btn btn-primary" type="submit">Aplicar</button>
            </form>
          </section>
          <section class="grid-2">
            <article class="card stack">
              <h2>Gastos por categoría</h2>
              <ul id="expensesByCategoryList" class="stack"></ul>
            </article>
            <article class="card stack">
              <h2>Balance</h2>
              <p id="balanceResume" class="muted">Sin datos</p>
            </article>
          </section>
        </div>
      </main>
    </div>
    <script type="module" src="../assets/js/app.js"></script>
    <script type="module" src="../assets/js/pages/reports.js"></script>
  </body>
</html>
