<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrackFinan | Registro</title>
    <link rel="stylesheet" href="../assets/css/variables.css" />
    <link rel="stylesheet" href="../assets/css/reset.css" />
    <link rel="stylesheet" href="../assets/css/components.css" />
    <link rel="stylesheet" href="../assets/css/layout.css" />
  </head>
  <body>
    <main class="auth-layout">
      <section class="card auth-card stack">
        <h1>Crear cuenta</h1>
        <p class="muted">Empieza a registrar ingresos y gastos.</p>
        <p id="errorBox" class="alert alert-error hidden"></p>
        <form id="registerForm" class="form-grid">
          <div class="form-row">
            <label for="name">Nombre</label>
            <input id="name" name="name" class="input" required />
          </div>
          <div class="form-row">
            <label for="email">Correo</label>
            <input id="email" name="email" class="input" type="email" required />
          </div>
          <div class="form-row">
            <label for="password">Contraseña</label>
            <input id="password" name="password" class="input" type="password" required />
          </div>
          <button id="submitBtn" class="btn btn-primary" type="submit">Registrarme</button>
        </form>
        <p class="muted">¿Ya tienes cuenta? <a href="./login.html">Inicia sesión</a></p>
      </section>
    </main>
    <script type="module" src="../assets/js/pages/register.js"></script>
  </body>
</html>
