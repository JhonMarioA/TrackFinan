<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrackFinan | Presupuestos</title>
    <link rel="stylesheet" href="../assets/css/variables.css" />
    <link rel="stylesheet" href="../assets/css/reset.css" />
    <link rel="stylesheet" href="../assets/css/components.css" />
    <link rel="stylesheet" href="../assets/css/layout.css" />
    <link rel="stylesheet" href="../assets/css/pages.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">TrackFinan</div>
        <nav class="nav">
          <a class="nav-link" href="dashboard.html">Dashboard</a>
          <a class="nav-link" href="accounts.html">Cuentas</a>
          <a class="nav-link" href="categories.html">Categorías</a>
          <a class="nav-link" href="payment-methods.html">Métodos de pago</a>
          <a class="nav-link" href="transactions.html">Transacciones</a>
          <a class="nav-link" href="budgets.html">Presupuestos</a>
          <a class="nav-link" href="reports.html">Reportes</a>
        </nav>
      </aside>
      <main class="content">
        <div class="container stack">
          <header class="topbar">
            <h1 class="hero-title">Presupuestos</h1>
            <button id="logoutBtn" class="btn btn-danger" type="button">Salir</button>
          </header>
          <section class="card stack">
            <h2>Nuevo presupuesto</h2>
            <form id="budgetForm" class="grid-2">
              <select class="select" name="category_id" id="budgetCategorySelect" required></select>
              <input class="input" name="amount" type="number" min="1" step="0.01" placeholder="Monto límite" required />
              <input class="input" name="month" type="number" min="1" max="12" placeholder="Mes" required />
              <input class="input" name="year" type="number" min="2000" max="2100" placeholder="Año" required />
              <button class="btn btn-primary" type="submit">Guardar</button>
            </form>
          </section>
          <section id="editBudgetCard" class="card stack hidden">
            <h2>Editar presupuesto</h2>
            <form id="editBudgetForm" class="grid-2">
              <input class="input" name="amount" type="number" min="1" step="0.01" placeholder="Monto límite" required />
              <div class="table-actions">
                <button class="btn btn-primary" type="submit">Guardar cambios</button>
                <button id="cancelEditBudgetBtn" class="btn btn-ghost" type="button">Cancelar</button>
              </div>
            </form>
          </section>
          <section class="card stack">
            <h2>Estado de presupuestos</h2>
            <p id="budgetsError" class="alert alert-error hidden"></p>
            <ul id="budgetStatusList" class="stack"></ul>
          </section>
          <section class="card stack">
            <h2>Listado de presupuestos</h2>
            <div class="table-wrap">
              <table class="table">
                <thead><tr><th>#</th><th>Categoría</th><th>Monto</th><th>Mes</th><th>Año</th><th>Acciones</th></tr></thead>
                <tbody id="budgetsTbody"></tbody>
              </table>
            </div>
          </section>
        </div>
      </main>
    </div>
    <script type="module" src="../assets/js/app.js"></script>
    <script type="module" src="../assets/js/pages/budgets.js"></script>
  </body>
</html>
